name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Validate Grafana dashboard
        run: node -e "JSON.parse(require('node:fs').readFileSync('grafana/dashboards/health-overview.json', 'utf8'))"
